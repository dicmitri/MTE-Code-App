backend:
  name: github
  repo: dicmitri/MTE-Code-App
  branch: main
  base_url: https://mte-oauth-proxy.medtecheurope.workers.dev
  auth_endpoint: /auth

# On localhost, use the optional Decap proxy started by `npm run cms` so the
# editor reads this working copy instead of the remote main branch.
local_backend: true

media_folder: public
public_folder: /

collections:
  # ─── The Code — Chapters ────────────────────────────────────────
  - name: "code"
    label: "The Code — Chapters"
    label_singular: "Code chapter"
    folder: "src/data/code"
    create: false
    delete: false
    extension: "json"
    format: "json"
    identifier_field: "id"
    summary: "{{title}} ({{id}})"
    sortable_fields: ["title", "part", "id"]
    editor:
      preview: false
    fields:
      - label: "Chapter ID"
        name: "id"
        widget: "hidden"
      - label: "Navigation part"
        name: "part"
        widget: "hidden"
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "This is the public chapter title. Changing it does not change the chapter URL."
      - label: "Navigation icon"
        name: "icon"
        widget: "hidden"
      - label: "Chapter summary"
        name: "summary"
        widget: "exact-html"
        hint: "Short introduction shown near the top of the chapter. Edit the wording inside the HTML tags."
      - label: "Sections"
        name: "sections"
        widget: "list"
        allow_add: false
        allow_remove: false
        allow_reorder: false
        collapsed: true
        summary: "{{fields.title}}"
        fields:
          - label: "Section Title"
            name: "title"
            widget: "string"
            hint: "Changing this can change the public section URL. Only do so as part of an approved heading change."
          - label: "Section text"
            name: "legalText"
            widget: "exact-html"
            hint: "Edit the wording inside the HTML tags. This editor preserves the stored HTML instead of converting it to Markdown."
          - label: "Q&As"
            name: "qas"
            widget: "list"
            allow_add: false
            allow_remove: false
            allow_reorder: false
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.q}}"
            fields:
              - label: "Question"
                name: "q"
                widget: "string"
              - label: "Answer"
                name: "a"
                widget: "exact-html"
                hint: "Edit the wording inside the HTML tags."

  # ─── Decision Trees ─────────────────────────────────────────────
  - name: "trees"
    label: "Decision Trees"
    editor:
      preview: false
    files:
      - name: "treeData"
        label: "All Decision Trees"
        file: "src/data/treeData.json"
        fields:
          - label: "Trees"
            name: "trees"
            widget: "list"
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - label: "ID"
                name: "id"
                widget: "string"
                hint: "Do not change — breaks routing."
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Category"
                name: "category"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Related Chapter"
                name: "relatedChapter"
                widget: "string"
                required: false
              - label: "Related Section"
                name: "relatedSection"
                widget: "string"
                required: false
              - label: "Nodes"
                name: "nodes"
                widget: "list"
                collapsed: true
                summary: "{{fields.id}} — {{fields.type}}"
                fields:
                  - label: "Node ID"
                    name: "id"
                    widget: "string"
                  - label: "Type"
                    name: "type"
                    widget: "select"
                    options: ["question", "result"]
                  - label: "Text"
                    name: "text"
                    widget: "text"
                  - label: "Help Text"
                    name: "helpText"
                    widget: "text"
                    required: false
                  - label: "Outcome"
                    name: "outcome"
                    widget: "select"
                    options:
                      - "compliant"
                      - "non-compliant"
                      - "conditional"
                      - "in-scope"
                      - "out-of-scope"
                      - "not-applicable"
                      - "not-required"
                    required: false
                    hint: "Only for result nodes"
                  - label: "Reference"
                    name: "reference"
                    widget: "string"
                    required: false
                  - label: "Options"
                    name: "options"
                    widget: "list"
                    required: false
                    fields:
                      - label: "Label"
                        name: "label"
                        widget: "string"
                      - label: "Next Node ID"
                        name: "next"
                        widget: "string"
